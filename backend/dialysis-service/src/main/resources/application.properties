spring.application.name=dialysis-service
server.port=8075

# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/dialysis_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# Disable Eureka Client (we are not using discovery service yet)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/nephro-realm

