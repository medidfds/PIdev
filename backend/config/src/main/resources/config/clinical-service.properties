# ==============================
# CLINICAL SERVICE CONFIG
# Managed by Config Server
# ==============================

spring.application.name=clinical-service
server.port=8079

# Welcome message
welcome.message=Welcome to Clinical Service

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/clinical_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# External services
user.service.base-url=http://localhost:8069/api/users

spring.cloud.config.server.git.uri=https://github.com/medidfds/PIdev.git